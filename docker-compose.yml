version: '3.8'

services:
  # Next.js Application
  app:
    build: .
    container_name: jcaesar-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  # Prisma Schema Migration Runner
  migration:
    build:
      context: .
      dockerfile: Dockerfile.migration
    container_name: jcaesar-migration
    environment:
      - DATABASE_URL=postgresql://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
    depends_on:
      - db


  # Background Worker (Enabled for Production Webhooks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: jcaesar-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Database: PostgreSQL + pgvector
  db:
    image: ankane/pgvector:latest
    container_name: jcaesar-db
    restart: always
    environment:
      - POSTGRES_DB=jcaesar_db
      - POSTGRES_USER=jcaesar_user
      - POSTGRES_PASSWORD=jcaesar_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jcaesar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jcaesar_user -d jcaesar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: jcaesar-pgbouncer
    environment:
      - DATABASE_URL=postgres://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - MIN_POOL_SIZE=10
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Redis for Queues (Persistence Enabled)
  redis:
    image: redis:7-alpine
    container_name: jcaesar-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - jcaesar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: jcaesar-prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: jcaesar-grafana
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  jcaesar_db_data:
  jcaesar_redis_data:
